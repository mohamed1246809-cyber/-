<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمل الفيديوهات الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="toast-container" class="fixed bottom-5 left-5 z-50 flex flex-col gap-3"></div>

    <div class="relative z-10 w-full max-w-3xl bg-slate-900 border border-slate-800 rounded-3xl p-6 sm:p-8 shadow-2xl my-8">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-emerald-400 mb-2">محمل الفيديوهات الذكي</h1>
            <p class="text-slate-400 text-sm">ضع رابط الفيديو أو قائمة التشغيل لتوليد روابط التحميل</p>
        </div>

        <div class="flex items-center bg-slate-950 border border-slate-700 rounded-2xl overflow-hidden mb-6">
            <button onclick="pasteFromClipboard()" class="px-4 text-slate-400 hover:text-emerald-400" title="لصق">
                <i class="fa-solid fa-paste text-xl"></i>
            </button>
            <input 
                type="text" 
                id="videoUrl" 
                placeholder="ضع رابط الفيديو هنا..." 
                class="flex-1 px-2 py-4 bg-transparent focus:outline-none text-white text-base"
            >
            <button 
                onclick="analyzeVideo()" 
                class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold px-6 py-4 flex items-center gap-2"
            >
                <span>تحليل</span>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div id="loading" class="hidden flex flex-col items-center my-6">
            <div class="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-emerald-400 text-sm mt-3">جاري التحليل...</p>
        </div>

        <div id="singleResultCard" class="hidden bg-slate-950 rounded-2xl border border-slate-800 p-5 mt-6">
            <div class="flex flex-col sm:flex-row gap-5 items-center">
                <img id="videoThumbnail" src="" class="w-full sm:w-48 aspect-video object-cover rounded-xl border border-slate-800">
                <div class="flex-1 w-full">
                    <h2 id="videoTitle" class="text-base font-bold text-white mb-3">عنوان الفيديو</h2>
                    <div id="qualityGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
                </div>
            </div>
        </div>

        <div id="playlistResultCard" class="hidden bg-slate-950 rounded-2xl border border-slate-800 p-5 mt-6">
            <h2 id="playlistTitle" class="text-lg font-bold text-white mb-2">عنوان القائمة</h2>
            <p class="text-xs text-slate-400 mb-4">عدد الفيديوهات: <span id="playlistCount">0</span></p>
            <div id="playlistGrid" class="grid grid-cols-1 gap-3 max-h-96 overflow-y-auto"></div>
        </div>

    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:5000';

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `${type === 'error' ? 'bg-red-600' : 'bg-emerald-600'} text-white px-4 py-3 rounded-xl text-sm font-medium shadow-lg transition-all duration-300`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('videoUrl').value = text;
            } catch (e) {
                showToast('يرجى لصق الرابط يدوياً', 'error');
            }
        }

        async function analyzeVideo(customUrl = null) {
            const urlInput = customUrl || document.getElementById('videoUrl').value.trim();
            const loading = document.getElementById('loading');
            const singleCard = document.getElementById('singleResultCard');
            const playlistCard = document.getElementById('playlistResultCard');

            if (!urlInput) {
                showToast('ضع رابطاً أولاً!', 'error');
                return;
            }

            loading.classList.remove('hidden');
            if (!customUrl) {
                singleCard.classList.add('hidden');
                playlistCard.classList.add('hidden');
            }

            try {
                const res = await fetch(`${API_BASE_URL}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.error || 'حدث خطأ بالسيرفر');
                }

                const data = await res.json();

                if (data.is_playlist) {
                    playlistCard.classList.remove('hidden');
                    singleCard.classList.add('hidden');
                    document.getElementById('playlistTitle').innerText = data.title;
                    document.getElementById('playlistCount').innerText = data.count;
                    
                    const grid = document.getElementById('playlistGrid');
                    grid.innerHTML = '';
                    (data.videos || []).forEach(v => {
                        const item = document.createElement('div');
                        item.className = "bg-slate-900 border border-slate-800 p-3 rounded-xl flex items-center justify-between gap-3";
                        item.innerHTML = `
                            <span class="text-sm font-medium text-white truncate">${v.index}. ${v.title}</span>
                            <button onclick="analyzeVideo('${v.url}')" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold px-3 py-1 rounded-lg text-xs whitespace-nowrap">تحميل</button>
                        `;
                        grid.appendChild(item);
                    });
                } else {
                    singleCard.classList.remove('hidden');
                    if (!customUrl) playlistCard.classList.add('hidden');

                    document.getElementById('videoTitle').innerText = data.title;
                    document.getElementById('videoThumbnail').src = data.thumbnail;
                    
                    const grid = document.getElementById('qualityGrid');
                    grid.innerHTML = '';
                    (data.formats || []).forEach(fmt => {
                        const a = document.createElement('a');
                        a.href = fmt.url;
                        a.target = '_blank';
                        a.className = "bg-slate-900 border border-slate-700 hover:border-emerald-400 text-center p-2 rounded-xl transition-all";
                        a.innerHTML = `<div class="text-xs font-bold text-emerald-400">${fmt.quality}</div><div class="text-[10px] text-slate-400">${fmt.ext}</div>`;
                        grid.appendChild(a);
                    });
                }

                showToast('تم التحليل بنجاح!');

            } catch (err) {
                showToast(err.message || 'تأكد من أن السيرفر يعمل في الـ Terminal', 'error');
            } finally {
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
